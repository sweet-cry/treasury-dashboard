<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>미국채 국가별 보유량</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080b12; color: #e4e8f0; font-family: 'Noto Sans KR', sans-serif; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, ReferenceLine } = Recharts;

const C = {
  bg:"#080b12", card:"#0e1320", border:"#1a2238",
  accent:"#f0a500", blue:"#3a7bd5", green:"#22c55e",
  red:"#ef4444", text:"#e4e8f0", sub:"#7a879e", muted:"#3a4458",
};

const TT = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background:"#0e1320", border:"1px solid #1a2238", borderRadius:8, padding:"10px 14px", fontSize:12 }}>
      <div style={{ color:"#f0a500", fontWeight:700, marginBottom:5 }}>{label}</div>
      {payload.map((p,i) => (
        <div key={i} style={{ display:"flex", justifyContent:"space-between", gap:14, color:"#e4e8f0" }}>
          <span style={{ color: p.stroke||"#7a879e" }}>{p.dataKey}</span>
          <span style={{ fontWeight:600 }}>${Number(p.value).toLocaleString()}B</span>
        </div>
      ))}
    </div>
  );
};

const MoM = ({ val, prev }) => {
  const diff = val - prev, pos = diff >= 0;
  return <span style={{ fontSize:11, color: pos?"#22c55e":"#ef4444", fontWeight:600 }}>
    {pos?"▲":"▼"} {Math.abs(diff).toFixed(1)}B ({pos?"+":""}{((diff/prev)*100).toFixed(1)}%)
  </span>;
};

export default function App() {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("ranking");
  const [rgn, setRgn] = useState("전체");
  const [refreshing, setRefreshing] = useState(false);

  useEffect(() => {
    fetch("/api/treasury")
      .then(r => r.json())
      .then(setData)
      .catch(console.error);
  }, []);

  const handleRefresh = async () => {
    setRefreshing(true);
    await fetch("/api/refresh", { method:"POST" });
    const res = await fetch("/api/treasury");
    setData(await res.json());
    setRefreshing(false);
  };

  if (!data) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", color:"#7a879e", fontSize:14 }}>
      데이터 로딩 중...
    </div>
  );

  const { top20, monthly, historical, updated_at } = data;
  const filtered = rgn === "전체" ? top20 : top20.filter(d => d.region === rgn);
  const maxVal = Math.max(...filtered.map(d => d.val));

  const regionData = [
    { region:"아시아", color:"#f0a500" },
    { region:"유럽",   color:"#3a7bd5" },
    { region:"기타",   color:"#8b5cf6" },
    { region:"중동",   color:"#22c55e" },
  ].map(r => ({
    ...r,
    val: top20.filter(d => d.region === r.region).reduce((s,d) => s+d.val, 0)
  }));
  const regionTotal = regionData.reduce((s,r) => s+r.val, 0);

  const tabs = [
    { id:"ranking",  label:"국가별 순위" },
    { id:"longterm", label:"장기추이 (2000~)" },
    { id:"monthly",  label:"2025 월별" },
    { id:"region",   label:"지역별 분포" },
  ];

  return (
    <div style={{ background:"#080b12", minHeight:"100vh", padding:"22px 18px" }}>

      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:4, height:28, background:"#f0a500", borderRadius:2 }} />
          <span style={{ fontSize:19, fontWeight:800 }}>미국채 국가별 보유량</span>
          <span style={{ background:"#f0a50018", color:"#f0a500", border:"1px solid #f0a50033", borderRadius:20, padding:"2px 10px", fontSize:11, fontWeight:700 }}>
            TIC · {updated_at}
          </span>
        </div>
        <button onClick={handleRefresh} disabled={refreshing} style={{
          padding:"5px 14px", borderRadius:20, cursor:"pointer", fontSize:12,
          border:"0.5px solid #1a2238", background:"transparent", color:"#7a879e"
        }}>
          {refreshing ? "수집 중..." : "🔄 새로고침"}
        </button>
      </div>
      <div style={{ fontSize:11, color:"#7a879e", marginBottom:18, marginLeft:14 }}>
        출처: U.S. Treasury International Capital (TIC) System · 매월 18일 자동 갱신
      </div>

      {/* Metric Cards */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, marginBottom:18 }}>
        {[
          { label:"외국 총 보유", val:"$9,271B", sub:<span style={{fontSize:11,color:"#ef4444"}}>▼ $88.3B MoM</span> },
          { label:"1위 일본", val:"$1,185.5B", sub:<MoM val={1185.5} prev={1202.7}/> },
          { label:"3위 중국 YTD", val:"-10.1%", sub:<span style={{fontSize:11,color:"#ef4444"}}>$784B → $684B</span> },
          { label:"한국 (18위)", val:"$140.6B", sub:<MoM val={140.6} prev={145.1}/> },
        ].map((m,i) => (
          <div key={i} style={{ background:"#0e1320", border:"0.5px solid #1a2238", borderRadius:10, padding:"11px 13px" }}>
            <div style={{ fontSize:11, color:"#7a879e", marginBottom:3 }}>{m.label}</div>
            <div style={{ fontSize:17, fontWeight:700, marginBottom:3 }}>{m.val}</div>
            {m.sub}
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{ display:"flex", gap:6, marginBottom:16, flexWrap:"wrap" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            padding:"5px 14px", borderRadius:20, cursor:"pointer", fontSize:12,
            border:`0.5px solid ${tab===t.id?"#f0a500":"#1a2238"}`,
            background: tab===t.id?"#f0a50018":"transparent",
            color: tab===t.id?"#f0a500":"#7a879e", fontWeight: tab===t.id?700:400
          }}>{t.label}</button>
        ))}
      </div>

      {/* Tab: Ranking */}
      {tab==="ranking" && <>
        <div style={{ display:"flex", gap:6, marginBottom:12, flexWrap:"wrap" }}>
          {["전체","아시아","유럽","중동","기타"].map(r => (
            <button key={r} onClick={() => setRgn(r)} style={{
              padding:"3px 12px", borderRadius:20, cursor:"pointer", fontSize:12,
              border:`0.5px solid ${rgn===r?"#3a7bd5":"#3a4458"}`,
              background: rgn===r?"#3a7bd522":"transparent",
              color: rgn===r?"#7ab3ff":"#7a879e"
            }}>{r}</button>
          ))}
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
          {filtered.map(d => {
            const pct=(d.val/maxVal)*100, diff=d.val-d.prev, pos=diff>=0;
            return (
              <div key={d.country} style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 10px", background:"#0e1320", borderRadius:8, border:"0.5px solid #1a2238" }}>
                <div style={{ width:20, fontSize:11, color:"#3a4458", textAlign:"right", flexShrink:0 }}>
                  {top20.findIndex(x=>x.country===d.country)+1}
                </div>
                <div style={{ width:100, fontSize:13, flexShrink:0 }}>{d.country}</div>
                <div style={{ flex:1, background:"#1a2238", borderRadius:3, height:16 }}>
                  <div style={{ width:`${pct}%`, height:"100%", background:d.color+"99", borderRadius:3 }} />
                </div>
                <div style={{ width:70, fontSize:12, fontWeight:600, textAlign:"right", flexShrink:0 }}>${d.val.toLocaleString()}B</div>
                <div style={{ width:70, fontSize:11, color:pos?"#22c55e":"#ef4444", textAlign:"right", flexShrink:0 }}>{pos?"▲":"▼"} {Math.abs(diff).toFixed(1)}B</div>
              </div>
            );
          })}
        </div>
      </>}

      {/* Tab: Long-term */}
      {tab==="longterm" && <>
        <div style={{ display:"flex", gap:14, marginBottom:10, flexWrap:"wrap" }}>
          {[{k:"총계",c:"#ffffff44",l:"외국 총계"},{k:"일본",c:"#f0a500"},{k:"중국",c:"#ef4444"},{k:"영국",c:"#3a7bd5"},{k:"한국",c:"#22c55e"}].map(l => (
            <span key={l.k} style={{ display:"flex", alignItems:"center", gap:5, fontSize:12 }}>
              <span style={{ width:14, height:3, background:l.c, display:"inline-block", borderRadius:2 }} />
              <span style={{ color:"#7a879e" }}>{l.l||l.k}</span>
            </span>
          ))}
        </div>
        <div style={{ width:"100%", height:300 }}>
          <ResponsiveContainer width="100%" height="100%">
            <LineChart data={historical} margin={{ top:10, right:10, left:-10, bottom:5 }}>
              <XAxis dataKey="year" tick={{ fill:"#7a879e", fontSize:10 }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fill:"#7a879e", fontSize:10 }} axisLine={false} tickLine={false} tickFormatter={v=>`$${v}`} />
              <Tooltip content={<TT/>} />
              <ReferenceLine x="2008" stroke="#ffffff18" strokeDasharray="3 3" label={{ value:"GFC", fill:"#7a879e", fontSize:9, position:"top" }} />
              <ReferenceLine x="2014" stroke="#ef444433" strokeDasharray="3 3" label={{ value:"中피크", fill:"#ef4444aa", fontSize:9, position:"top" }} />
              <ReferenceLine x="2020" stroke="#ffffff18" strokeDasharray="3 3" label={{ value:"코로나", fill:"#7a879e", fontSize:9, position:"top" }} />
              <Line dataKey="총계" stroke="#ffffff33" strokeWidth={1.5} dot={false} strokeDasharray="4 2" />
              <Line dataKey="일본" stroke="#f0a500" strokeWidth={2} dot={false} />
              <Line dataKey="중국" stroke="#ef4444" strokeWidth={2} dot={false} />
              <Line dataKey="영국" stroke="#3a7bd5" strokeWidth={2} dot={false} />
              <Line dataKey="한국" stroke="#22c55e" strokeWidth={1.5} dot={false} />
            </LineChart>
          </ResponsiveContainer>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginTop:14 }}>
          {[
            { t:"2008 GFC",     d:"달러 안전자산 수요 급증 → 총 보유 $3T 돌파. 중국 $727B",      c:"#f0a500" },
            { t:"2014 중국 피크", d:"중국 최대 $1,316B. 이후 외환개입·다변화로 지속 감소",          c:"#ef4444" },
            { t:"2020 코로나",   d:"달러 수요 폭등. 총계 $7T 돌파. 일본·영국 급증",               c:"#3a7bd5" },
            { t:"2022~현재",    d:"금리인상기 채권평가손. 중국 감소세 지속, 일본 최대보유국 유지", c:"#22c55e" },
          ].map((e,i) => (
            <div key={i} style={{ background:"#0e1320", border:"0.5px solid #1a2238", borderRadius:8, padding:"10px 12px" }}>
              <div style={{ fontSize:12, fontWeight:700, color:e.c, marginBottom:4 }}>{e.t}</div>
              <div style={{ fontSize:11, color:"#7a879e", lineHeight:1.6 }}>{e.d}</div>
            </div>
          ))}
        </div>
      </>}

      {/* Tab: Monthly */}
      {tab==="monthly" && <>
        <div style={{ display:"flex", gap:14, marginBottom:10, flexWrap:"wrap" }}>
          {[{k:"일본",c:"#f0a500"},{k:"중국",c:"#ef4444"},{k:"영국",c:"#3a7bd5"},{k:"한국",c:"#22c55e"}].map(l => (
            <span key={l.k} style={{ display:"flex", alignItems:"center", gap:5, fontSize:12 }}>
              <span style={{ width:14, height:3, background:l.c, display:"inline-block", borderRadius:2 }} />
              <span style={{ color:"#7a879e" }}>{l.k}</span>
            </span>
          ))}
        </div>
        <div style={{ width:"100%", height:280 }}>
          <ResponsiveContainer width="100%" height="100%">
            <LineChart data={monthly} margin={{ top:5, right:10, left:-10, bottom:5 }}>
              <XAxis dataKey="month" tick={{ fill:"#7a879e", fontSize:10 }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fill:"#7a879e", fontSize:10 }} axisLine={false} tickLine={false} tickFormatter={v=>`$${v}`} domain={[100,1300]} />
              <Tooltip content={<TT/>} />
              <Line dataKey="일본" stroke="#f0a500" strokeWidth={2} dot={false} />
              <Line dataKey="중국" stroke="#ef4444" strokeWidth={2} dot={false} />
              <Line dataKey="영국" stroke="#3a7bd5" strokeWidth={2} dot={false} />
              <Line dataKey="한국" stroke="#22c55e" strokeWidth={1.5} dot={false} />
            </LineChart>
          </ResponsiveContainer>
        </div>
        <div style={{ marginTop:14, padding:12, background:"#0e1320", borderRadius:8, border:"0.5px solid #1a2238", fontSize:12, lineHeight:1.9 }}>
          <div style={{ color:"#f0a500", fontWeight:700, marginBottom:4 }}>2025 핵심 관전포인트</div>
          <div style={{ color:"#7a879e" }}>🔴 <span style={{ color:"#e4e8f0" }}>중국:</span> 연내 순감소 $784B→$684B (YTD -10.1%), 탈달러 가속</div>
          <div style={{ color:"#7a879e" }}>🟡 <span style={{ color:"#e4e8f0" }}>일본:</span> 역대 최대 수준 유지. 12월 감소는 엔화방어 개입 가능성</div>
          <div style={{ color:"#7a879e" }}>🔵 <span style={{ color:"#e4e8f0" }}>영국:</span> 런던 금융허브 경유분 포함 — 실 보유국과 괴리 가능</div>
          <div style={{ color:"#7a879e" }}>🟢 <span style={{ color:"#e4e8f0" }}>한국:</span> 연초 대비 증가세 → 외환보유고 다변화 추세</div>
        </div>
      </>}

      {/* Tab: Region */}
      {tab==="region" && <>
        <div style={{ fontSize:12, color:"#7a879e", marginBottom:14 }}>지역별 합계 (Top 20개국 기준)</div>
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          {[...regionData].sort((a,b)=>b.val-a.val).map(r => {
            const pct = (r.val/regionTotal*100).toFixed(1);
            return (
              <div key={r.region}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                  <span style={{ fontSize:14, fontWeight:600, color:r.color }}>{r.region}</span>
                  <span style={{ fontSize:13 }}>${Math.round(r.val).toLocaleString()}B <span style={{ color:"#7a879e", fontSize:11 }}>({pct}%)</span></span>
                </div>
                <div style={{ background:"#3a4458", borderRadius:4, height:20, overflow:"hidden" }}>
                  <div style={{ width:`${pct}%`, height:"100%", background:r.color+"cc", borderRadius:4 }} />
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ marginTop:20, padding:12, background:"#0e1320", borderRadius:8, border:"0.5px solid #1a2238", fontSize:12, color:"#7a879e", lineHeight:1.8 }}>
          <div style={{ color:"#f0a500", fontWeight:700, marginBottom:4 }}>⚠️ TIC 데이터 한계</div>
          제3국 커스터디 계좌 보유분은 실제 보유국에 귀속 안 됨.<br/>
          벨기에·케이맨·룩셈부르크 등 금융허브는 실수요자와 다를 수 있음.
        </div>
      </>}

      <div style={{ textAlign:"right", color:"#3a4458", fontSize:10, marginTop:18 }}>
        Source: U.S. Treasury TIC System · 마지막 갱신: {updated_at}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
