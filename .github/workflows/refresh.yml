name: data-refresh

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: DTS refresh
        run: |
          curl -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/dts" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      - name: QRA refresh
        run: |
          curl -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/qra" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
